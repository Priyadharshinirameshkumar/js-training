<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Responsive Design</title>

    <link rel="stylesheet"
          href="css/responsive.css">

    <!--
    The viewport meta tag tells the browser to match the page width
    to the device's screen width and set the initial zoom level to 1.
    It is required so the page displays correctly on mobile devices
    and supports responsive layouts.
    -->

</head>

<body>
<nav class="resp-nav">

    <div class="resp-logo">
        Logo
    </div>

    <ul class="resp-links">

        <li>
            <a href="#">Home</a>
        </li>

        <li>
            <a href="#">Products</a>
        </li>

        <li>
            <a href="#">About</a>
        </li>

        <li>
            <a href="#">Contact</a>
        </li>

    </ul>

</nav>
    <p>
        Open DevTools and toggle the device toolbar
        (Ctrl + Shift + M) to simulate a mobile device.
    </p>
<div class="responsive-box">

    <h2>Resize the window</h2>

    <p>
        This box changes style at different screen sizes.
    </p>

</div>

<section class="image-section">

    <h2>Responsive Image</h2>

    <img
        src="https://picsum.photos/800/400"
        alt="Sample landscape">

</section>
</body>

</html>
