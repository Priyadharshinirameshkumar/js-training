<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Responsive Design</title>

    <link rel="stylesheet"
          href="css/responsive.css">

    <!--
    The viewport meta tag tells the browser to match the page width
    to the device's screen width and set the initial zoom level to 1.
    It is required so the page displays correctly on mobile devices
    and supports responsive layouts.
    -->

</head>

<body>

    <p>
        Open DevTools and toggle the device toolbar
        (Ctrl + Shift + M) to simulate a mobile device.
    </p>

</body>

</html>
